server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:

  # Host logs
  - job_name: "system"
    static_configs:
      - targets: ["localhost"]
        labels:
          job: "system"
          host: "${HOSTNAME}"
          __path__: /var/log/{syslog,auth.log,kern.log}

  # Docker container logs
  - job_name: "docker"
    static_configs:
      - targets: ["localhost"]
        labels:
          job: "docker"
          host: "${HOSTNAME}"
          __path__: /var/lib/docker/containers/*/*-json.log
    pipeline_stages:
      - json:
          expressions:
            stream: stream
            log: log
      - labels:
          stream:
      - output:
          source: log
