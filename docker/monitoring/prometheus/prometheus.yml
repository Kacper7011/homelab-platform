global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

# Monitored VM's and lxc containers
  - job_name: "node-exporter"
    static_configs:

      - targets: ["10.10.10.31:9100"]
        labels:
          nodename: "pve01"

      - targets: ["10.10.10.32:9100"]
        labels:
          nodename: "pve02"

      - targets: ["10.10.10.33:9100"]
        labels:
          nodename: "pve03"
