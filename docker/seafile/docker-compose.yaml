services:

  db:
    image: mariadb:10.11
    container_name: mariadb
    restart: always
    env_file:
      - ~/.secrets/seafile/.env
    volumes:
      - /srv/seafile/mysql:/var/lib/mysql

  memcached:
    image: memcached:1.6
    container_name: memcached
    restart: always
    command: memcached -m 256

  seafile:
    image: seafileltd/seafile-mc:latest
    container_name: seafile
    restart: always
    ports:
      - "9000:80"
    volumes:
      - /srv/seafile/data:/shared
    env_file:
      - ~/.secrets/seafile/.env
    environment:
      DB_HOST: db
      SEAFILE_SERVER_LETSENCRYPT: "false"
      SERVICE_URL: "http://seafile.kacper-nxn.pl"
      FILE_SERVER_ROOT: "http://seafile.kacper-nxn.pl/seafhttp"
    depends_on:
      - db
      - memcached
