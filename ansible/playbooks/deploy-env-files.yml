- name: Deploy .env files from hashi vault
  hosts: services
  become: true

  tasks:
    - name: Ensure secrets directory exists
      ansible.builtin.file:
        path: "{{ item.dest }}"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0750"
      loop: "{{ vault_services }}"

    - name: Deploy .env file for each service
      ansible.builtin.template:
        src: ../templates/env.j2
        dest: "{{ item.dest }}/.env"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0600"
      loop: "{{ vault_services }}"
      vars:
        env_vars: "{{ lookup('community.hashi_vault.hashi_vault', 'secret/data/services/' + item.name) }}"

