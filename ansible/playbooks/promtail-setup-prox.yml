- hosts: proxmox_nodes
  become: true
  vars:
    promtail_version: "2.9.4"
    monitoring_ip: "10.10.10.107"
  tasks:

    - name: Install unzip
      ansible.builtin.apt:
        name: unzip
        state: present

    - name: Create promtail user (Journal Access)
      ansible.builtin.user:
        name: promtail
        groups: ["adm", "systemd-journal"]
        append: true
        create_home: false
        shell: /usr/sbin/nologin

    - name: Download and install Promtail
      ansible.builtin.unarchive:
        src: "https://github.com/grafana/loki/releases/download/v{{ promtail_version }}/promtail-linux-amd64.zip"
        dest: /usr/local/bin
        remote_src: yes
        creates: /usr/local/bin/promtail-linux-amd64

    - name: Link binary
      ansible.builtin.copy:
        src: /usr/local/bin/promtail-linux-amd64
        dest: /usr/local/bin/promtail
        mode: '0755'
        remote_src: yes

    - name: Create config directory
      ansible.builtin.file:
        path: /etc/promtail
        state: directory

    - name: Deploy Proxmox config
      ansible.builtin.template:
        src: ../templates/promtail-prox.yml.j2
        dest: /etc/promtail/promtail.yml

    - name: Setup systemd service
      ansible.builtin.copy:
        dest: /etc/systemd/system/promtail.service
        content: |
          [Unit]
          Description=Promtail service
          After=network.target

          [Service]
          Type=simple
          User=promtail
          ExecStart=/usr/local/bin/promtail -config.file=/etc/promtail/promtail.yml
          Restart=always

          [Install]
          WantedBy=multi-user.target

    - name: Start Promtail
      ansible.builtin.systemd:
        name: promtail
        state: restarted
        enabled: true
        daemon_reload: true