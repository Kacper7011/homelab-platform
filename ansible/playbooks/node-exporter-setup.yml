- hosts: virtual_machines,proxmox_nodes
  become: true
  vars: 
    version: "1.8.2"
    arch: "amd64"

  tasks:

    - name: Create node_exporter user 
      ansible.builtin.user:
        name: node_exporter 
        shell: /usr/sbin/nologin
        system: true
        create_home: false

    
    - name: Install node_exporter
      ansible.builtin.unarchive:
        src: "https://github.com/prometheus/node_exporter/releases/download/v{{ version }}/node_exporter-{{ version }}.linux-{{ arch }}.tar.gz"
        dest: /tmp
        remote_src: yes

    - name: Copy binary in to /usr/local/bin
      ansible.builtin.copy:
        src: "/tmp/node_exporter-{{ version }}.linux-{{ arch }}/node_exporter"
        dest: /usr/local/bin/node_exporter
        mode: '0755'
        owner: node_exporter
        group: node_exporter
        remote_src: yes

    - name: Create systemd service 
      ansible.builtin.copy:
        dest: /etc/systemd/system/node_exporter.service
        content: |
          [Unit]
          Description=Node Exporter
          After=network.target

          [Service]
          User=node_exporter
          Group=node_exporter
          Type=simple
          ExecStart=/usr/local/bin/node_exporter \
            --collector.systemd \
            --collector.processes \
            --collector.filesystem.mount-points-exclude="^/(dev|proc|sys|var/lib/docker/.+)($|/)" \
            {% if 'pve' in inventory_hostname or ansible_distribution == 'Debian' %}
            --collector.zfs \
            {% endif %}

          [Install]
          WantedBy=multi-user.target
      
    - name: start node-exporter
      ansible.builtin.systemd:
        name: node_exporter
        state: restarted
        enabled: true
        daemon_reload: true
