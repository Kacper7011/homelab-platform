- hosts: virtual_machines
  become: true
  vars:
    promtail_version: "2.9.4"
    monitoring_ip: "10.10.10.107"
  tasks:

    - name: Install unzip
      ansible.builtin.apt: 
        name: unzip
        state: present
        update_cache: yes
        cache_valid_time: 300

    - name: Ensure docker group exists
      ansible.builtin.group:
        name: docker
        state: present

    - name: Create promtail user
      ansible.builtin.user:
        name: promtail
        create_home: false
        shell: /usr/sbin/nologin
        system: true
        groups: ['adm', 'docker']
        append: true
    
    - name: Download promtail binary 
      ansible.builtin.unarchive:
        src: "https://github.com/grafana/loki/releases/download/v{{ promtail_version }}/promtail-linux-amd64.zip"
        dest: /usr/local/bin
        remote_src: yes
        creates: /usr/local/bin/promtail-linux-amd64
    
    - name: Change binary name and give permissions
      ansible.builtin.copy:
        src: /usr/local/bin/promtail-linux-amd64
        dest: /usr/local/bin/promtail 
        mode: '0755'
        remote_src: yes
    
    - name: Create config directory
      ansible.builtin.file:
        path: /etc/promtail
        state: directory

    - name: Create promtail data directory
      ansible.builtin.file:
        path: /var/lib/promtail
        state: directory
        owner: promtail
        group: promtail
        mode: '0750'

    - name: Deploy promtail config
      ansible.builtin.template:
        src: ../templates/promtail-vm.yml.j2
        dest: /etc/promtail/promtail.yml

    - name: Create systemd service 
      ansible.builtin.copy: 
        dest: /etc/systemd/system/promtail.service
        content: |
          [Unit]
          Description=Promtail service
          After=network.target docker.service
          Wants=docker.service

          [Service]
          Type=simple
          User=promtail
          SupplementaryGroups=docker
          AmbientCapabilities=CAP_DAC_READ_SEARCH
          CapabilityBoundingSet=CAP_DAC_READ_SEARCH
          ExecStart=/usr/local/bin/promtail -config.file=/etc/promtail/promtail.yml
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
      
    - name: Start promtail 
      ansible.builtin.systemd:
        name: promtail 
        state: restarted
        enabled: true
        daemon_reload: true

