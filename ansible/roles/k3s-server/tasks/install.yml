- name: k3s instalation
  ansible.builtin.get_url:
    url: https://get.k3s.io
    dest: /tmp/k3s_install.sh
    mode: '0755'

- name: Run k3s server
  ansible.builtin.command: /tmp/k3s_install.sh
  args:
    creates: /usr/local/bin/k3s
  environment:
    INSTALL_K3S_EXEC: "--write-kubeconfig-mode 644"

- name: Ensure that k3s is running
  ansible.builtin.service:
    name: k3s
    state: started
    enabled: true
