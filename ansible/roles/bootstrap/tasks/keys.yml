- name: Add SSH key for ansible user
  ansible.builtin.authorized_key:
    user: ansible
    state: present
    key: "{{ lookup('file', '~/.ssh/.bootstrap/ansible_ed25519.pub') }}"

- name: Add SSH key for system_user
  ansible.builtin.authorized_key:
    user: "{{ system_user }}"
    state: present
    key: "{{ lookup('file', '~/.ssh/proxmox_vms_ed25519.pub') }}"

- name: Add SSH key for Giga-pc
  ansible.builtin.authorized_key:
    user: "{{ system_user }}"
    state: present
    key: "{{ lookup('file', '~/.ssh/.giga-pc/proxmox_ed25519.pub') }}"

- name: Add SSH key for Giga-mac
  ansible.builtin.authorized_key:
    user: "{{ system_user }}"
    state: present
    key: "{{ lookup('file', '~/.ssh/.mac/mac_ssh_proxmox.pub') }}"
